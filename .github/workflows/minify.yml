name: Minify CSS

on:
  push:
    branches: [main]
    paths:
      - "src/_core.css"
      - "src/_palette-*.css"
      - "src/*-bg.css"
      - ".github/workflows/minify.yml"
  workflow_dispatch:

# Avoid infinite loop: skip when this workflow's own bot commit triggers it.
concurrency:
  group: minify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip-minify]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build variants
        # Each capyppuccin-<variant>.min.css = _palette-<variant>.css + _core.css, minified.
        # Adding a variant = drop a new _palette-<name>.css; the loop picks it up.
        run: |
          set -euo pipefail
          for palette in src/_palette-*.css; do
            variant=$(basename "$palette" .css | sed 's/^_palette-//')
            if [ "$variant" = "capyppuccin" ]; then
              out="capyppuccin.min.css"
            else
              out="capyppuccin-${variant}.min.css"
            fi
            cat "$palette" src/_core.css | npx --yes csso-cli@4.0.1 -o "$out"
            echo "built $out from $palette + src/_core.css"
          done
          for wrapper in src/*-bg.css; do
            out=$(basename "$wrapper" .css).min.css
            npx --yes csso-cli@4.0.1 "$wrapper" -o "$out"
            echo "built $out from $wrapper"
          done

      - name: Commit minified output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add capyppuccin*.min.css
          if git diff --cached --quiet; then
            echo "No changes in minified output, skipping commit."
            exit 0
          fi
          git commit -m "build: regen minified css [skip-minify]"
          git push
